name: Daily Portfolio Metrics Refresh

on:
  schedule:
    # Runs at 23:00 UTC (6:00 PM EST / 8:00 AM AEST next day) Monday - Friday
    - cron: '0 23 * * 1-5'
  workflow_dispatch: # Manual refresh button override

jobs:
  refresh-metrics:
    runs-on: ubuntu-latest
    steps:
    - name: Check out your repository code
      uses: actions/checkout@v4

    - name: Setup Python environment inside cloud node
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install yfinance package dependency
      run: pip install yfinance

    - name: Execute price calculations and update layout
      run: python3 update_readme.py

    - name: Automatically commit and push clean changes to main profile
      run: |
        git config --global user.name "GitHub Action Automation"
        git config --global user.email "actions@github.com"
        git add README.md
        git diff-index --quiet HEAD || git commit -m "Automated daily asset pricing matrix refresh [skip ci]"
        git push origin main
